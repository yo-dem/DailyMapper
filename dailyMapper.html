<!doctype html>
<html lang="it" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayMapper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="save-toast"></div>
    <div id="app">
      <header id="topbar">
        <div
          style="
            font-weight: 600;
            font-size: 20px;
            margin-right: 30px;
            width: 154px;
          "
        >
          Daily-Mapper
        </div>
        <button class="nav-tab active" onclick="switchView('editor', this)">
          Note
        </button>
        <button class="nav-tab" onclick="switchView('map', this)">Mappa</button>
        <button
          class="btn-export"
          onclick="exportJSON()"
          title="Esporta JSON (Ctrl+E)"
        >
          &#8595; Esporta
        </button>
        <button
          class="btn-export"
          onclick="triggerImport()"
          title="Importa JSON"
        >
          &#8593; Importa
        </button>
        <input
          type="file"
          id="import-file-input"
          accept=".json"
          style="display: none"
          onchange="doImport(event)"
        />
      </header>
      <div id="main-container">
        <aside id="sidebar">
          <div class="month-nav">
            <button onclick="changeMonth(-1)">❮</button>
            <input
              type="date"
              id="date-picker"
              style="display: none"
              onchange="pickDate(event)"
            />
            <span
              id="month-label"
              onclick="document.getElementById('date-picker').showPicker()"
              style="
                cursor: pointer;
                text-decoration: underline;
                font-size: 14px;
                text-transform: capitalize;
              "
            ></span>
            <button onclick="changeMonth(1)">❯</button>
          </div>
          <button class="btn-oggi" onclick="goToToday()">OGGI</button>
          <div id="days-list"></div>
        </aside>

        <main id="editor-view" class="view active">
          <textarea
            id="main-editor"
            style="
              width: 100%;
              height: 100%;
              padding: 40px;
              border: none;
              outline: none;
              resize: none;
              font-family: inherit;
              font-size: 16px;
              line-height: 1.6;
            "
            oninput="save()"
          ></textarea>
        </main>

        <main id="map-view" class="view">
          <div id="map-canvas-container">
            <div id="infinite-canvas">
              <svg id="arrows-svg">
                <defs>
                  <!-- markerUnits=userSpaceOnUse means size is in canvas px, not stroke-relative -->
                  <marker
                    id="ah-end"
                    markerWidth="8"
                    markerHeight="8"
                    refX="7"
                    refY="4"
                    orient="auto"
                    markerUnits="userSpaceOnUse"
                  >
                    <path d="M1,1 L7,4 L1,7 Z" fill="#bbb" />
                  </marker>
                  <marker
                    id="ah-start"
                    markerWidth="8"
                    markerHeight="8"
                    refX="1"
                    refY="4"
                    orient="auto-start-reverse"
                    markerUnits="userSpaceOnUse"
                  >
                    <path d="M1,1 L7,4 L1,7 Z" fill="#bbb" />
                  </marker>
                  <marker
                    id="ah-end-hover"
                    markerWidth="8"
                    markerHeight="8"
                    refX="7"
                    refY="4"
                    orient="auto"
                    markerUnits="userSpaceOnUse"
                  >
                    <path d="M1,1 L7,4 L1,7 Z" fill="#6200ee" />
                  </marker>
                  <marker
                    id="ah-start-hover"
                    markerWidth="8"
                    markerHeight="8"
                    refX="1"
                    refY="4"
                    orient="auto-start-reverse"
                    markerUnits="userSpaceOnUse"
                  >
                    <path d="M1,1 L7,4 L1,7 Z" fill="#6200ee" />
                  </marker>
                </defs>
              </svg>
            </div>
          </div>
          <div id="postit-nav">
            <button
              class="nav-arrow"
              onclick="navPostit(-1)"
              title="Postit precedente"
            >
              &#8592;
            </button>
            <span id="nav-label"></span>
            <button
              class="nav-arrow"
              onclick="navPostit(1)"
              title="Postit successivo"
            >
              &#8594;
            </button>
          </div>
          <div id="zoom-controls">
            <button class="zoom-btn" onclick="adjustZoom(0.1)">+</button>
            <div class="zoom-slider-container">
              <div class="zoom-slider-track">
                <div id="zoom-slider-thumb" class="zoom-slider-thumb"></div>
              </div>
              <div id="zoom-level-display" class="zoom-level-display"></div>
            </div>
            <button class="zoom-btn" onclick="adjustZoom(-0.1)">−</button>
          </div>
          <button class="fab" onclick="addPostit()">+</button>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
