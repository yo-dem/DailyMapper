<!doctype html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily-Mapper</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="save-toast"></div>
<div id="app">
  <header id="topbar">
    <div
            style="
            font-weight: 600;
            font-size: 20px;
            margin-right: 30px;
            width: 154px;
          "
    >
      Daily-Mapper
    </div>
    <button class="nav-tab active" onclick="switchView('editor', this)">
      Note
    </button>
    <button class="nav-tab" onclick="switchView('map', this)">Mappa</button>
    <button class="nav-tab" onclick="switchView('agenda', this)">Agenda</button>

    <input
            type="file"
            id="import-file-input"
            accept=".json"
            style="display: none"
            onchange="doImport(event)"
    />
    <div class="topbar-actions">
      <button
              class="topbar-actions-btn"
              id="topbar-actions-btn"
              onclick="toggleTopbarActions(event)"
              title="Altro"
      >
        ⋮
      </button>
      <div class="topbar-actions-panel" id="topbar-actions-panel">
        <button class="topbar-actions-item" onclick="exportJSON()">
          Esporta
        </button>
        <button class="topbar-actions-item" onclick="triggerImport()">
          Importa
        </button>
        <button class="topbar-actions-item" onclick="triggerClearAll()">
          Cancella tutto
        </button>
      </div>
    </div>
    <button
            class="theme-toggle"
            id="theme-toggle"
            onclick="toggleTheme()"
            title="Cambia tema"
    >
      🌙
    </button>
  </header>
  <div id="main-container">
    <aside id="sidebar">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">❮</button>
        <input
                type="date"
                id="date-picker"
                style="display: none"
                onchange="pickDate(event)"
        />
        <span
                id="month-label"
                onclick="openDateModal()"
                style="
                cursor: pointer;
                text-decoration: none;
                font-size: 16px;
                text-transform: capitalize;
              "
        ></span>
        <button onclick="changeMonth(1)">❯</button>
      </div>
      <button class="btn-oggi" onclick="goToToday()">OGGI</button>
      <div id="days-list"></div>
    </aside>
    <div
            class="sidebar-expander"
            id="sidebar-expander"
            title="Apri/chiudi sidebar"
    ></div>

    <main id="editor-view" class="view active">
      <div id="editor-bg">
        <!-- I fogli A4 vengono creati dinamicamente da editor.js -->
      </div>
    </main>

    <main id="map-view" class="view">
      <div id="map-canvas-container">
        <div id="infinite-canvas">
          <svg id="arrows-svg">
            <defs>
              <marker
                      id="ah-end"
                      markerWidth="12"
                      markerHeight="12"
                      refX="10.5"
                      refY="6"
                      orient="auto"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#bbb" />
              </marker>
              <marker
                      id="ah-start"
                      markerWidth="12"
                      markerHeight="12"
                      refX="1.5"
                      refY="6"
                      orient="auto-start-reverse"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#bbb" />
              </marker>
              <marker
                      id="ah-end-hover"
                      markerWidth="12"
                      markerHeight="12"
                      refX="10.5"
                      refY="6"
                      orient="auto"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#6200ee" />
              </marker>
              <marker
                      id="ah-start-hover"
                      markerWidth="12"
                      markerHeight="12"
                      refX="1.5"
                      refY="6"
                      orient="auto-start-reverse"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#6200ee" />
              </marker>
            </defs>
          </svg>
        </div>
      </div>
      <div id="zoom-controls">
        <button class="zoom-btn" onclick="adjustZoom(0.1)">+</button>
        <div class="zoom-slider-container">
          <div class="zoom-slider-track">
            <div id="zoom-slider-thumb" class="zoom-slider-thumb"></div>
          </div>
          <div id="zoom-level-display" class="zoom-level-display"></div>
        </div>
        <button class="zoom-btn" onclick="adjustZoom(-0.1)">−</button>
      </div>
      <button class="fab" onclick="addPostit()">+</button>
    </main>


    <main id="agenda-view" class="view">
      <div id="agenda-granularity-toolbar" class="agenda-granularity-toolbar"></div>
      <div style="flex: 1; overflow-y: auto; padding: 20px 60px 40px 20px;">
        <div id="agenda-list" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px;"></div>
      </div>
    </main>

    <div id="postit-nav">
      <button
              class="nav-arrow"
              onclick="navPostit(-1)"
              title="Postit precedente"
      >
        &#8592;
      </button>
      <span id="nav-label"></span>
      <button
              class="nav-arrow"
              onclick="navPostit(1)"
              title="Postit successivo"
      >
        &#8594;
      </button>
    </div>
  </div>
</div>

<div id="date-modal" class="date-modal hidden" onclick="closeDateModal()">
  <div class="date-modal-card" onclick="event.stopPropagation()">
    <div class="date-modal-header">
      <span>Scegli data</span>
      <button class="close-btn" onclick="closeDateModal()">✕</button>
    </div>
    <div class="date-modal-nav">
      <button onclick="changeModalMonth(-1)">❮</button>
      <div id="date-modal-month-label"></div>
      <button onclick="changeModalMonth(1)">❯</button>
    </div>
    <div class="date-modal-weekdays">
      <span>Lu</span><span>Ma</span><span>Me</span><span>Gi</span
    ><span>Ve</span><span>Sa</span><span>Do</span>
    </div>
    <div class="date-modal-grid" id="date-modal-grid"></div>
  </div>
</div>

<div id="alarm-modal" class="date-modal hidden">
  <div class="alarm-modal-card">
    <h2 style="color: var(--alarm-color); margin-bottom: 10px; font-size: 24px;">⏰ Promemoria!</h2>
    <p id="alarm-message" style="margin-bottom: 24px; font-size: 16px; line-height: 1.5; color: var(--md-on-surface);"></p>
    <div class="alarm-btns">
      <button onclick="stopAlarm()" class="btn-spegni">Spegni</button>
      <button onclick="snoozeAlarm()" class="btn-posticipa">Posticipa (5 min)</button>
      <button onclick="goToAlarm()" class="btn-vai">Vai alla nota</button>
    </div>
  </div>
</div>

<!--
  Ordine di caricamento degli script (le dipendenze devono precedere chi le usa):
  1. state.js    → costanti e oggetto state (nessuna dipendenza)
  2. storage.js  → dayData / save / saveMap  (dipende da state)
  3. theme.js    → initTheme / toggleTheme   (dipende da THEME_KEY)
  4. editor.js   → loadDay                   (dipende da dayData, renderMap, renderAgenda)
  5. sidebar.js  → renderDays, nav date      (dipende da state, dayData, loadDay, switchView, centerOnPostit)
  6. agenda.js   → renderAgenda, allarmi     (dipende da state, dayData, saveMap, renderDays, loadDay, switchView)
  7. map.js      → renderMap, postit, frecce (dipende da state, dayData, saveMap, renderDays — deve venire dopo sidebar)
  8. ui.js       → switchView, toast, I/E    (dipende da tutti i precedenti)
  9. main.js     → bootstrap + keyboard      (dipende da tutto)
-->
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/editor.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/agenda.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
