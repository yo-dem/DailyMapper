<!doctype html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily-Mapper</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="save-toast"></div>
<div id="app">
  <header id="topbar">
    <div
            style="
            font-weight: 600;
            font-size: 20px;
            margin-right: 30px;
            width: 154px;
          "
    >
      Daily-Mapper
    </div>
    <button class="nav-tab active" onclick="switchView('editor', this)">
      Note
    </button>
    <button class="nav-tab" onclick="switchView('map', this)">Mappa</button>
    <button class="nav-tab" onclick="switchView('agenda', this)">Agenda</button>
    <button class="nav-tab" onclick="switchView('todo', this)">ToDo</button>

    <input
            type="file"
            id="import-file-input"
            accept=".json"
            style="display: none"
            onchange="doImport(event)"
    />
    <div class="topbar-actions">
      <button
              class="topbar-actions-btn"
              id="topbar-actions-btn"
              onclick="toggleTopbarActions(event)"
              title="Altro"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="4" height="18" viewBox="0 0 4 18" fill="currentColor"><circle cx="2" cy="2" r="1.8"/><circle cx="2" cy="9" r="1.8"/><circle cx="2" cy="16" r="1.8"/></svg>
      </button>
      <div class="topbar-actions-panel" id="topbar-actions-panel">
        <button class="topbar-actions-item" onclick="exportJSON()">
          Esporta
        </button>
        <button class="topbar-actions-item" onclick="triggerImport()">
          Importa
        </button>
        <button class="topbar-actions-item" onclick="triggerClearAll()">
          Cancella tutto
        </button>
      </div>
    </div>
    <button
            class="theme-toggle"
            id="theme-toggle"
            onclick="toggleTheme()"
            title="Cambia tema"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>
  <div id="main-container">
    <aside id="sidebar">
      <div class="month-nav">
        <button onclick="changeMonth(-1)"><svg xmlns="http://www.w3.org/2000/svg" width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 1 1 8 8 15"/></svg></button>
        <input
                type="date"
                id="date-picker"
                style="display: none"
                onchange="pickDate(event)"
        />
        <span
                id="month-label"
                onclick="openDateModal()"
                style="
                cursor: pointer;
                text-decoration: none;
                font-size: 16px;
                text-transform: capitalize;
              "
        ></span>
        <button onclick="changeMonth(1)"><svg xmlns="http://www.w3.org/2000/svg" width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 1 8 8 1 15"/></svg></button>
      </div>
      <button class="btn-oggi" onclick="goToToday()">OGGI</button>
      <div id="days-list"></div>
    </aside>
    <div
            class="sidebar-expander"
            id="sidebar-expander"
            title="Apri/chiudi sidebar"
    ></div>

    <main id="editor-view" class="view active">
      <div id="editor-bg">
        <!-- I fogli A4 vengono creati dinamicamente da editor.js -->
      </div>
    </main>

    <main id="map-view" class="view">
      <div id="map-canvas-container">
        <div id="infinite-canvas">
          <svg id="arrows-svg">
            <defs>
              <marker
                      id="ah-end"
                      markerWidth="12"
                      markerHeight="12"
                      refX="10.5"
                      refY="6"
                      orient="auto"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#bbb" />
              </marker>
              <marker
                      id="ah-start"
                      markerWidth="12"
                      markerHeight="12"
                      refX="1.5"
                      refY="6"
                      orient="auto-start-reverse"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#bbb" />
              </marker>
              <marker
                      id="ah-end-hover"
                      markerWidth="12"
                      markerHeight="12"
                      refX="10.5"
                      refY="6"
                      orient="auto"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#6200ee" />
              </marker>
              <marker
                      id="ah-start-hover"
                      markerWidth="12"
                      markerHeight="12"
                      refX="1.5"
                      refY="6"
                      orient="auto-start-reverse"
                      markerUnits="userSpaceOnUse"
              >
                <path d="M1.5,1.5 L10.5,6 L1.5,10.5 Z" fill="#6200ee" />
              </marker>
            </defs>
          </svg>
        </div>
      </div>
      <div id="zoom-controls">
        <button class="zoom-btn" onclick="adjustZoom(0.1)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg></button>
        <div class="zoom-slider-container">
          <div class="zoom-slider-track">
            <div id="zoom-slider-thumb" class="zoom-slider-thumb"></div>
          </div>
          <div id="zoom-level-display" class="zoom-level-display"></div>
        </div>
        <button class="zoom-btn" onclick="adjustZoom(-0.1)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="7" x2="13" y2="7"/></svg></button>
      </div>
      <button class="fab" onclick="addPostit()"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="11" y1="2" x2="11" y2="20"/><line x1="2" y1="11" x2="20" y2="11"/></svg></button>
    </main>


    <main id="agenda-view" class="view">
      <div id="agenda-granularity-toolbar" class="agenda-granularity-toolbar"></div>
      <div style="flex: 1; overflow-y: auto; padding: 20px 60px 40px 20px;">
        <div id="agenda-list" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px;"></div>
      </div>
    </main>

    <main id="todo-view" class="view">
      <div id="todo-bg">
        <div id="todo-list"></div>
      </div>
      <button class="fab" onclick="addTodo()"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="11" y1="2" x2="11" y2="20"/><line x1="2" y1="11" x2="20" y2="11"/></svg></button>
    </main>

    <div id="postit-nav">
      <button
              class="nav-arrow"
              onclick="navPostit(-1)"
              title="Postit precedente"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="7" x2="1" y2="7"/><polyline points="7 1 1 7 7 13"/></svg>
      </button>
      <span id="nav-label"></span>
      <button
              class="nav-arrow"
              onclick="navPostit(1)"
              title="Postit successivo"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="7" x2="17" y2="7"/><polyline points="11 1 17 7 11 13"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="date-modal" class="date-modal hidden" onclick="closeDateModal()">
  <div class="date-modal-card" onclick="event.stopPropagation()">
    <div class="date-modal-header">
      <span>Scegli data</span>
      <button class="close-btn" onclick="closeDateModal()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg></button>
    </div>
    <div class="date-modal-nav">
      <button onclick="changeModalMonth(-1)"><svg xmlns="http://www.w3.org/2000/svg" width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 1 1 8 8 15"/></svg></button>
      <div id="date-modal-month-label"></div>
      <button onclick="changeModalMonth(1)"><svg xmlns="http://www.w3.org/2000/svg" width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 1 8 8 1 15"/></svg></button>
    </div>
    <div class="date-modal-weekdays">
      <span>Lu</span><span>Ma</span><span>Me</span><span>Gi</span
    ><span>Ve</span><span>Sa</span><span>Do</span>
    </div>
    <div class="date-modal-grid" id="date-modal-grid"></div>
  </div>
</div>

<div id="alarm-modal" class="date-modal hidden">
  <div class="alarm-modal-card">
    <h2 style="color: var(--alarm-color); margin-bottom: 10px; font-size: 24px; display:flex; align-items:center; justify-content:center; gap:10px;"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14 15"/><line x1="5" y1="3" x2="2.5" y2="6"/><line x1="19" y1="3" x2="21.5" y2="6"/></svg> Promemoria!</h2>
    <p id="alarm-message" style="margin-bottom: 24px; font-size: 16px; line-height: 1.5; color: var(--md-on-surface);"></p>
    <div class="alarm-btns">
      <button onclick="stopAlarm()" class="btn-spegni">Spegni</button>
      <button onclick="snoozeAlarm()" class="btn-posticipa">Posticipa (5 min)</button>
      <button onclick="goToAlarm()" class="btn-vai">Vai alla nota</button>
    </div>
  </div>
</div>

<!--
  Ordine di caricamento degli script (le dipendenze devono precedere chi le usa):
  1. state.js    → costanti e oggetto state (nessuna dipendenza)
  2. storage.js  → dayData / save / saveMap  (dipende da state)
  3. theme.js    → initTheme / toggleTheme   (dipende da THEME_KEY)
  4. editor.js   → loadDay                   (dipende da dayData, renderMap, renderAgenda)
  5. sidebar.js  → renderDays, nav date      (dipende da state, dayData, loadDay, switchView, centerOnPostit)
  6. agenda.js   → renderAgenda, allarmi     (dipende da state, dayData, saveMap, renderDays, loadDay, switchView)
  7. map.js      → renderMap, postit, frecce (dipende da state, dayData, saveMap, renderDays — deve venire dopo sidebar)
  8. ui.js       → switchView, toast, I/E    (dipende da tutti i precedenti)
  9. todo.js     → renderTodo, addTodo       (dipende da dayData, saveMap, renderDays, showToast)
 10. main.js     → bootstrap + keyboard      (dipende da tutto)
-->
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/editor.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/agenda.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/todo.js"></script>
<script src="js/main.js"></script>
</body>
</html>
